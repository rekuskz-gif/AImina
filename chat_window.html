<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mina Chat</title>
    <style>
        /* Базовые стили (скелет) */
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        
        /* Шапка окна */
        #chat-header { padding: 15px 20px; color: white; font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 10px; background: #7c3aed; }
        
        /* Область сообщений */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Пузырьки сообщений */
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .bot { align-self: flex-start; background: #ffffff; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user { align-self: flex-end; background: #7c3aed; color: white; border-bottom-right-radius: 4px; }
        
        /* Поле ввода */
        #chat-input-area { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 14px; }
        button { border: none; background: #7c3aed; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div id="chat-header">Загрузка...</div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <input type="text" id="user-msg" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">></button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const clientId = params.get('clientId');

        // 1. ПОДГРУЖАЕМ ЦВЕТА И НАСТРОЙКИ ИЗ ТАБЛИЦЫ
        async function loadConfig() {
            try {
                const res = await fetch(`/api/chat_config?clientId=${clientId}`);
                const data = await res.json();
                
                // Применяем цвета из таблицы
                document.getElementById('chat-header').style.background = data.headerColor;
                document.getElementById('chat-header').innerText = data.botName || 'AI Mina';
                document.querySelector('button').style.background = data.headerColor;
                
                // Меняем цвет пузырьков пользователя (через CSS переменную)
                const userMsgs = document.querySelectorAll('.user');
                userMsgs.forEach(m => m.style.background = data.userBubbleColor);

                if (data.welcomeMsg) addMsg(data.welcomeMsg, 'bot');
            } catch (e) {
                console.error("Ошибка загрузки конфига:", e);
                document.getElementById('chat-header').innerText = "AI Mina";
            }
        }

        // 2. ОТПРАВКА СООБЩЕНИЯ
        async function send() {
            const input = document.getElementById('user-msg');
            const text = input.value.trim();
            if(!text) return;

            addMsg(text, 'user');
            input.value = '';

            try {
                const res = await fetch('/api/authentication', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ clientId, messages: [{role: 'user', content: text}] })
                });
                const result = await res.json();
                addMsg(result.text, 'bot');
            } catch (e) {
                addMsg("Ошибка связи с сервером.", 'bot');
            }
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            const container = document.getElementById('chat-messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        loadConfig();
    </script>
</body>
</html>
