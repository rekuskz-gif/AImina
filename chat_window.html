<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    
    <!-- Загружаем Firebase для работы с базой данных -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        /* ============================================================
           ОБЩИЕ СТИЛИ
           ============================================================ */
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: #f0f2f5; 
            overflow: hidden;
        }

        /* ============================================================
           СТИЛЬ ШАПКИ ОКНА (с аватарой и именем)
           ============================================================ */
        
        #chat-header { 
            padding: 10px 20px; 
            color: white; 
            font-weight: bold; 
            font-size: 16px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            background: #7c3aed;  /* Фиолетовый по умолчанию */
            min-height: 60px; 
            flex-shrink: 0;
        }

        #chat-header img {
            width: 38px; 
            height: 38px; 
            border-radius: 50%;  /* Круглая аватара */
            object-fit: cover; 
            border: 2px solid rgba(255,255,255,0.4);
        }

        /* ============================================================
           СТИЛЬ ОБЛАСТИ С СООБЩЕНИЯМИ
           ============================================================ */
        
        #chat-messages { 
            flex: 1;  /* Занимает всё оставшееся место */
            overflow-y: auto;  /* Прокрутка вниз если много сообщений */
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: #f0f2f5;
        }

        /* Одно сообщение в чате */
        .msg { 
            padding: 10px 14px; 
            border-radius: 18px;  /* Скруглённые углы */
            max-width: 80%;  /* Не больше 80% ширины */
            font-size: 14px; 
            line-height: 1.4; 
            word-wrap: break-word;  /* Переносить слова на новую строку */
            animation: fadeIn 0.3s ease;  /* Появление с эффектом */
        }

        /* Анимация появления сообщения */
        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(10px);  /* Выплывает снизу */
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        /* Сообщение бота (серое, слева) */
        .bot { 
            align-self: flex-start;  /* Выравнивание слева */
            background: #ffffff; 
            color: #333; 
            border-bottom-left-radius: 4px;  /* Острый угол слева */
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* Сообщение юзера (цветное, справа) */
        .user { 
            align-self: flex-end;  /* Выравнивание справа */
            color: white; 
            border-bottom-right-radius: 4px;  /* Острый угол справа */
        }

        /* Анимация печати (три точки) */
        .typing {
            display: flex; 
            gap: 4px; 
            align-self: flex-start;  /* Слева как сообщение бота */
            padding: 12px 16px; 
            background: white;
            border-radius: 18px; 
            border-bottom-left-radius: 4px;
        }

        /* Одна точка в анимации печати */
        .typing span {
            width: 8px; 
            height: 8px; 
            background: #999;
            border-radius: 50%;  /* Круглая */
            animation: typing 1.4s infinite;  /* Бесконечная анимация */
        }

        /* Задержки для анимации трёх точек (волна) */
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        /* Анимация печати: точка мигает */
        @keyframes typing {
            0%, 60%, 100% { 
                opacity: 0.5;  /* Полупрозрачная */
            }
            30% { 
                opacity: 1;  /* Полная видимость */
            }
        }

        /* ============================================================
           СТИЛЬ ОБЛАСТИ ВВОДА (текстовое поле + кнопка)
           ============================================================ */
        
        #chat-input-area { 
            padding: 15px 15px 8px 15px; 
            background: white; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #ddd;  /* Разделитель */
            flex-shrink: 0;  /* Не сжимается */
        }

        /* Текстовое поле ввода */
        input { 
            flex: 1;  /* Занимает оставшееся место */
            padding: 12px 15px; 
            border: 1px solid #ddd;
            border-radius: 25px;  /* Скруглённое */
            outline: none;  /* Без границы при фокусе */
            font-size: 14px; 
            transition: border-color 0.2s;  /* Плавная смена цвета */
        }

        /* При фокусе на инпут - меняем цвет границы */
        input:focus { 
            border-color: #7c3aed;  /* Фиолетовый */
        }

        /* Кнопка отправки (стрелка) */
        button { 
            border: none; 
            background: #7c3aed;  /* Фиолетовый */
            color: white; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%;  /* Круглая */
            cursor: pointer; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.2s;  /* Плавные переходы */
            flex-shrink: 0;  /* Не сжимается */
        }

        button:hover { 
            opacity: 0.9;  /* Легче при наведении */
        }

        button:active { 
            transform: scale(0.95);  /* Сжимается при клике */
        }

        button:disabled { 
            opacity: 0.5;  /* Полупрозрачная когда отключена */
            cursor: not-allowed;
        }

        /* Сообщение об ошибке */
        .error-msg {
            background: #fee;  /* Светлокрасный */
            color: #c33;  /* Тёмнокрасный текст */
            padding: 12px;
            border-radius: 8px; 
            font-size: 13px; 
            margin: 10px; 
            border: 1px solid #fcc;  /* Красная граница */
        }

        /* Футер (внизу окна) */
        #chat-footer {
            background: white; 
            text-align: center;
            padding: 6px 15px 10px 15px; 
            font-size: 11px; 
            display: none;  /* По умолчанию скрыт */
        }

        #chat-footer a { 
            text-decoration: none; 
            font-weight: bold; 
        }

        #chat-footer a:hover { 
            text-decoration: underline; 
        }
    </style>
</head>
<body>
    <!-- ============================================================
         ШАПКА ОКНА ЧАТА
         ============================================================ -->
    <div id="chat-header">Загрузка...</div>

    <!-- ============================================================
         ОБЛАСТЬ С СООБЩЕНИЯМИ
         ============================================================ -->
    <div id="chat-messages"></div>

    <!-- ============================================================
         ОБЛАСТЬ ВВОДА (ИНПУТ + КНОПКА)
         ============================================================ -->
    <div id="chat-input-area">
        <input type="text" id="user-msg" placeholder="Введите сообщение...">
        <button id="send-btn">→</button>
    </div>

    <!-- ============================================================
         ФУТЕР (ссылка внизу)
         ============================================================ -->
    <div id="chat-footer"></div>

    <script>
        // ============================================================
        // КОНФИГ FIREBASE
        // Подключаемся к той же базе данных что и виджет
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBgXvb4GLdtaZlw5dgnYKGddOIpFYIXXAU",
            databaseURL: "https://aimina-d3597-default-rtdb.firebaseio.com",
            projectId: "aimina-d3597",
            appId: "1:590164687607:web:c9f97739c0358dfd2571f2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        // ПОЛУЧАЕМ ПАРАМЕТРЫ ИЗ URL
        // Ожидаемый URL: chat_window.html?clientId=mina_001&sessionId=user_abc123_123456
        // ============================================================
        const params = new URLSearchParams(window.location.search);
        const clientId = params.get('clientId');
        const sessionId = params.get('sessionId');

        console.log('📝 clientId:', clientId, 'sessionId:', sessionId);

        // ============================================================
        // ФУНКЦИЯ: getSessionId()
        // НАЗНАЧЕНИЕ: Если sessionId не в URL - создаём новый
        // ============================================================
        function getSessionId() {
            // Если в URL есть sessionId - используем его
            if (sessionId) return sessionId;
            
            // Иначе создаём новый
            let newSessionId = localStorage.getItem(`aimina_session_${clientId}`);
            if (!newSessionId) {
                newSessionId = 'user_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem(`aimina_session_${clientId}`, newSessionId);
            }
            return newSessionId;
        }

        const finalSessionId = getSessionId();
        const historyRef = db.ref(`chats/${clientId}/${finalSessionId}`);

        // ============================================================
        // ПЕРЕМЕННЫЕ СОСТОЯНИЯ
        // ============================================================
        let config = null;          // Конфиг из chat_config API
        let isLoading = false;      // Сейчас отправляется сообщение?
        let chatHistory = [];       // История всех сообщений

        // ============================================================
        // ОБРАБОТЧИК: Нажатие Enter в инпуте
        // ============================================================
        document.getElementById('user-msg').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                send();  // Отправляем сообщение
            }
        });

        // ============================================================
        // ОБРАБОТЧИК: Клик на кнопку отправки
        // ============================================================
        document.getElementById('send-btn').addEventListener('click', function() {
            send();
        });

        // ============================================================
        // ФУНКЦИЯ: loadConfig()
        // НАЗНАЧЕНИЕ: Загрузить конфиг окна из API
        // ЧТО ДЕЛАЕТ:
        // 1. Получает конфиг из /api/chat_config
        // 2. Применяет цвета и тексты
        // 3. Загружает историю из Firebase
        // 4. Показывает приветствие если история пустая
        // ============================================================
        async function loadConfig() {
            try {
                // Проверяем что clientId есть
                if (!clientId) throw new Error('clientId не найден в URL');

                console.log('⚙️ Загружаем конфиг...');

                // Запрашиваем конфиг окна
                const res = await fetch(`/api/chat_config?clientId=${clientId}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Ошибка загрузки конфига');
                config = data;

                console.log('✅ Конфиг загружен:', config);

                // ---- Применяем цвета из конфига ----
                const header = document.getElementById('chat-header');
                const btn = document.getElementById('send-btn');
                const input = document.getElementById('user-msg');
                const footer = document.getElementById('chat-footer');

                header.style.background = config.headerColor || '#7c3aed';
                btn.style.background = config.headerColor || '#7c3aed';
                input.placeholder = config.placeholder || 'Введите сообщение...';

                // ---- Создаём шапку с аватарой ----
                header.innerHTML = '';
                if (config.avatarUrl) {
                    const img = document.createElement('img');
                    img.src = config.avatarUrl;
                    img.onerror = () => img.style.display = 'none';
                    header.appendChild(img);
                }

                // Добавляем имя бота
                const nameSpan = document.createElement('span');
                nameSpan.textContent = config.botName || 'AI Chat';
                header.appendChild(nameSpan);

                // ---- Применяем кастомные стили ----
                const styleElement = document.createElement('style');
                let css = `
                    .user { 
                        background: ${config.userBubbleColor || '#7c3aed'} !important; 
                    }
                    .bot { 
                        background: ${config.botBubbleColor || '#ffffff'} !important; 
                    }
                    input:focus { 
                        border-color: ${config.headerColor || '#7c3aed'} !important; 
                    }
                `;
                // Если есть кастомный CSS - добавляем его
                if (config.customCSS && config.customCSS.trim()) {
                    css += '\n' + config.customCSS;
                }
                styleElement.textContent = css;
                document.head.appendChild(styleElement);

                // ---- Показываем футер если нужен ----
                if (config.footerText && config.footerText.trim()) {
                    footer.style.display = 'block';
                    footer.innerHTML = `<a href="${config.footerUrl || '#'}" target="_blank" style="color: ${config.footerColor || '#999'}">${config.footerText}</a>`;
                }

                // ---- Загружаем историю этого браузера ----
                console.log('📚 Загружаем историю из Firebase...');
                const snapshot = await historyRef.once('value');
                if (snapshot.exists()) {
                    chatHistory = snapshot.val() || [];
                    console.log(`✅ История загружена (${chatHistory.length} сообщений)`);
                    
                    // Показываем все сообщения
                    chatHistory.forEach(msg => {
                        if (msg.role !== 'system') {
                            const type = msg.fromManager ? 'manager' : 
                                        (msg.role === 'assistant' ? 'bot' : 'user');
                            addMsg(msg.content, type);
                        }
                    });
                } else {
                    // История пустая - показываем приветствие
                    console.log('👋 История пустая, показываем приветствие');
                    if (config.welcomeMsg) {
                        addMsg(config.welcomeMsg, 'bot');
                        chatHistory.push({ role: 'assistant', content: config.welcomeMsg });
                        historyRef.set(chatHistory);
                    }
                }

                // ---- Слушаем новые сообщения в реальном времени ----
                historyRef.on('value', (snap) => {
                    if (!snap.exists()) return;
                    
                    const val = snap.val();
                    const newHistory = Array.isArray(val) ? val : [];

                    // Проверяем есть ли новые сообщения
                    if (newHistory.length > chatHistory.length) {
                        const newMessages = newHistory.slice(chatHistory.length);
                        chatHistory = newHistory;

                        // Показываем только новые сообщения
                        newMessages.forEach(msg => {
                            if (!msg) return;
                            
                            // Если это от менеджера - показываем синим
                            if (msg.fromManager) {
                                addMsg(msg.content, 'manager');
                            }
                            // Если это от ИИ
                            else if (msg.role === 'assistant') {
                                addMsg(msg.content, 'bot');
                            }
                            // Если это от юзера
                            else if (msg.role === 'user') {
                                addMsg(msg.content, 'user');
                            }
                        });
                    }
                });

            } catch (error) {
                console.error('❌ Config error:', error);
                addMsg(`❌ Ошибка загрузки: ${error.message}`, 'error');
                document.getElementById('user-msg').disabled = true;
                document.getElementById('send-btn').disabled = true;
            }
        }

        // ============================================================
        // ФУНКЦИЯ: send()
        // НАЗНАЧЕНИЕ: Отправить сообщение юзера в Claude
        // ============================================================
        async function send() {
            if (isLoading || !config) return;

            const input = document.getElementById('user-msg');
            const btn = document.getElementById('send-btn');
            const text = input.value.trim();
            
            if (!text) return;

            console.log('✉️ Юзер пишет:', text.substring(0, 50));

            // ---- Показываем сообщение юзера ----
            addMsg(text, 'user');
            input.value = '';

            // ---- Сохраняем в историю ----
            chatHistory.push({ role: 'user', content: text });
            historyRef.set(chatHistory);

            // ---- Показываем анимацию печати ----
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            document.getElementById('chat-messages').appendChild(typingDiv);
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;

            // ---- Блокируем кнопку и инпут ----
            isLoading = true;
            btn.disabled = true;
            input.disabled = true;

            try {
                console.log('🚀 Отправляем в Claude...');
                
                // Отправляем в наш API
                const res = await fetch('/api/authentication', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        clientId, 
                        sessionId: finalSessionId, 
                        messages: chatHistory 
                    })
                });

                typingDiv.remove();  // Убираем анимацию печати
                const result = await res.json();

                // ---- ИСПРАВЛЕНИЕ: Если ИИ выключен ----
                if (result.aiDisabled) {
                    console.log('⏸️ ИИ выключен');
                    addMsg('🔴 Менеджер ответит вам в ближайшее время...', 'bot');
                    return;
                }

                if (!res.ok) throw new Error(result.error || 'API error');
                if (!result.text) return;

                console.log('🤖 Claude ответил');

                // ---- Показываем ответ ----
                addMsg(result.text, 'bot');
                chatHistory.push({ role: 'assistant', content: result.text });
                historyRef.set(chatHistory);

            } catch (error) {
                console.error('Send error:', error);
                typingDiv.remove();
                addMsg(`❌ ${error.message}`, 'error');
                chatHistory.pop();  // Удаляем неудачное сообщение
            } finally {
                // ---- Разблокируем ----
                typingDiv.remove();
                isLoading = false;
                btn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }

        // ============================================================
        // ФУНКЦИЯ: addMsg(text, type)
        // НАЗНАЧЕНИЕ: Добавить сообщение в чат
        // ПАРАМЕТРЫ:
        //   text - текст сообщения
        //   type - тип: 'user', 'bot', 'manager', 'error'
        // ============================================================
        function addMsg(text, type) {
            const div = document.createElement('div');
            
            // Если ошибка - применяем стиль ошибки
            if (type === 'error') {
                div.className = 'error-msg';
            } else {
                // Иначе обычное сообщение с типом
                div.className = `msg ${type}`;
            }
            
            div.innerText = text;
            const container = document.getElementById('chat-messages');
            container.appendChild(div);
            
            // Прокручиваем вниз чтобы видеть новое сообщение
            container.scrollTop = container.scrollHeight;
        }

        // ============================================================
        // ЗАПУСК: Загружаем конфиг когда страница готова
        // ============================================================
        loadConfig();
    </script>
</body>
</html>
